name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: go test -count=1 -race ./...

      - name: Run vet
        run: go vet ./...

      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          LDFLAGS="-s -w -X openlimit/pkg/version.Version=${VERSION}"
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/openlimit-gateway-linux-amd64 ./cmd/gateway
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/openlimit-gateway-linux-arm64 ./cmd/gateway
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/openlimit-gateway-darwin-amd64 ./cmd/gateway
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/openlimit-gateway-darwin-arm64 ./cmd/gateway
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/openlimit-gateway-windows-amd64.exe ./cmd/gateway

      - name: Create SHA256 checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
