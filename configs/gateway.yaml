server:
  host: 0.0.0.0
  port: 8080
  read_timeout_ms: 15000
  write_timeout_ms: 15000
  idle_timeout_ms: 60000

logging:
  level: info
  format: json
  add_source: false
  redact_prompts: true

cache:
  exact:
    enabled: true
    max_entries: 10000
    ttl_seconds: 3600

routing:
  defaults:
    timeout_ms: 60000
    retry:
      attempts: 3
      backoff: exponential
      initial_ms: 250
      max_ms: 4000
      retry_on:
        - rate_limit
        - timeout
        - server_error

providers:
  zai:
    type: openai-compatible
    base_url: https://api.z.ai/api/coding/paas/v4
    keys:
      - id: zai-primary
        value: "YOUR_ZAI_API_KEY_HERE"
        weight: 100

  ollama:
    type: openai-compatible
    base_url: http://localhost:11434/v1
    keys:
      - id: local
        value: dummy
        weight: 100

models:
  glm-5.1:
    routes:
      - provider: zai
        model: glm-5.1
        weight: 100

  local:
    routes:
      - provider: ollama
        model: llama3.1
        weight: 100

# Schema-Budget Coupling: prune tool schemas based on query relevance
# and context window budget. Default: disabled.
mcp:
  sbc:
    enabled: false
    mode: "off"
    budget_tokens: 32000
    min_tools: 8
    fallback: false
