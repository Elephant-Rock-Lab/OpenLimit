services:
  gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DATABASE_URL: postgres://openlimit:openlimit@postgres:5432/openlimit?sslmode=disable
    volumes:
      - ../configs/gateway.docker.yaml:/app/configs/gateway.yaml:ro
    depends_on:
      - ollama
      - postgres

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openlimit
      POSTGRES_PASSWORD: openlimit
      POSTGRES_DB: openlimit
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openlimit"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: ["stateful"]
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ../deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - gateway

  grafana:
    image: grafana/grafana:latest
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ../deploy/grafana:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus

volumes:
  ollama:
  postgres:
