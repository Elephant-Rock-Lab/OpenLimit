<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenLimit Dashboard</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px}
.header h1{font-size:18px;font-weight:600}
.header .ver{color:var(--muted);font-size:13px}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);padding:0 24px}
.tab{padding:10px 20px;cursor:pointer;color:var(--muted);font-size:14px;border-bottom:2px solid transparent;transition:.2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.container{max-width:1200px;margin:0 auto;padding:24px}
.panel{display:none}
.panel.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card h2{font-size:16px;font-weight:600;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid var(--border)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge.green{background:#22c55e20;color:var(--green)}
.badge.red{background:#ef444420;color:var(--red)}
.badge.yellow{background:#eab30820;color:var(--yellow)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.stat{text-align:center;padding:16px}
.stat .value{font-size:28px;font-weight:700}
.stat .label{color:var(--muted);font-size:13px}
.filters{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.filters input,.filters select{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;color:var(--text);font-size:13px}
.filters input:focus,.filters select:focus{outline:none;border-color:var(--accent)}
.loading{text-align:center;color:var(--muted);padding:40px}
.error{color:var(--red);padding:20px}
code{background:var(--bg);padding:2px 6px;border-radius:4px;font-size:12px}
.provider-card{padding:16px}
.provider-card .name{font-weight:600;font-size:15px;margin-bottom:8px}
.provider-card .meta{display:flex;gap:16px;font-size:13px;color:var(--muted)}
.chart-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.chart-bar .bar{height:20px;background:var(--accent);border-radius:3px;min-width:2px;transition:width .3s}
.chart-bar .bar-label{width:100px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-bar .bar-value{color:var(--muted);min-width:70px}
</style>
</head>
<body>
<div class="header">
<h1>⚡ OpenLimit</h1>
<span class="ver" id="version">—</span>
</div>
<div class="tabs">
<div class="tab active" data-panel="overview">Overview</div>
<div class="tab" data-panel="keys">Keys</div>
<div class="tab" data-panel="usage">Usage</div>
<div class="tab" data-panel="providers">Providers</div>
<div class="tab" data-panel="logs">Request Log</div>
</div>
<div class="container">
<!-- Overview -->
<div class="panel active" id="panel-overview">
<div class="grid" id="overview-stats"></div>
<div class="card"><h2>Projects</h2><div id="overview-projects"></div></div>
</div>
<!-- Keys -->
<div class="panel" id="panel-keys">
<div class="card"><h2>Virtual Keys</h2>
<div class="filters"><input type="text" id="key-filter" placeholder="Filter by name or prefix..."></div>
<table><thead><tr><th>Prefix</th><th>Name</th><th>Project</th><th>Models</th><th>RPM</th><th>Budget</th></tr></thead>
<tbody id="keys-table"></tbody></table></div>
</div>
<!-- Usage -->
<div class="panel" id="panel-usage">
<div class="card"><h2>Usage Analytics</h2>
<div class="filters">
<select id="usage-period"><option value="daily">Daily</option><option value="monthly">Monthly</option></select>
<select id="usage-project"></select>
</div>
<div id="usage-chart"></div>
</div>
<div class="card"><h2>Top Models by Spend</h2><div id="usage-top-models"></div></div>
</div>
<!-- Providers -->
<div class="panel" id="panel-providers">
<div class="grid" id="provider-cards"></div>
</div>
<!-- Request Log -->
<div class="panel" id="panel-logs">
<div class="card"><h2>Request Log</h2>
<div class="filters">
<input type="text" id="log-model" placeholder="Model...">
<input type="text" id="log-provider" placeholder="Provider...">
<select id="log-stream"><option value="">All Types</option><option value="false">Non-Streaming</option><option value="true">Streaming</option></select>
<button onclick="loadLogs()" style="background:var(--accent);border:none;color:#fff;padding:6px 16px;border-radius:var(--radius);cursor:pointer">Filter</button>
</div>
<table><thead><tr><th>Time</th><th>Model</th><th>Provider</th><th>Tokens</th><th>Cost</th><th>Duration</th><th>Cache</th></tr></thead>
<tbody id="logs-table"></tbody></table></div>
</div>
</div>

<script>
const API=window.location.origin;
let token='';
function getToken(){token=localStorage.getItem('admin_token')||prompt('Enter admin bearer token:');if(token)localStorage.setItem('admin_token',token);return token}
async function api(path){if(!token)getToken();const r=await fetch(API+path,{headers:{'Authorization':'Bearer '+token}});if(r.status===401){localStorage.removeItem('admin_token');getToken();return api(path)}return r.json()}

// Tabs
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.getElementById('panel-'+t.dataset.panel).classList.add('active');loadPanel(t.dataset.panel)});

function loadPanel(p){switch(p){case'overview':loadOverview();break;case'keys':loadKeys();break;case'usage':loadUsage();break;case'providers':loadProviders();break;case'logs':loadLogs()}}

// Overview
async function loadOverview(){const[health,projects,keys]=await Promise.all([api('/health'),api('/admin/projects'),api('/admin/keys')]);document.getElementById('version').textContent='v'+health.version;
const s=document.getElementById('overview-stats');
s.innerHTML=`<div class="card stat"><div class="value">${projects.length}</div><div class="label">Projects</div></div><div class="card stat"><div class="value">${keys.length}</div><div class="label">Virtual Keys</div></div>`;
const pp=document.getElementById('overview-projects');
if(projects.length===0){pp.innerHTML='<p style="color:var(--muted)">No projects yet</p>';return}
pp.innerHTML='<table><thead><tr><th>Name</th><th>Created</th></tr></thead><tbody>'+projects.map(p=>`<tr><td>${esc(p.name)}</td><td>${p.created_at||'—'}</td></tr>`).join('')+'</tbody></table>'}

// Keys
async function loadKeys(){const[keys,projects]=await Promise.all([api('/admin/keys'),api('/admin/projects')]);const pMap={};projects.forEach(p=>pMap[p.id]=p.name);
const filter=document.getElementById('key-filter').value.toLowerCase();
const filtered=keys.filter(k=>!filter||k.name.toLowerCase().includes(filter)||k.key_prefix.toLowerCase().includes(filter));
document.getElementById('keys-table').innerHTML=filtered.map(k=>`<tr><td><code>${esc(k.key_prefix)}...</code></td><td>${esc(k.name)}</td><td>${esc(pMap[k.project_id]||k.project_id)}</td><td>${(k.allowed_models||[]).length||'All'}</td><td>${k.rpm_limit||'∞'}</td><td>${k.budget_limit_usd?'$'+k.budget_limit_usd.toFixed(2):'—'}</td></tr>`).join('')}
document.getElementById('key-filter').oninput=()=>loadKeys();

// Usage
async function loadUsage(){const period=document.getElementById('usage-period').value;const pid=document.getElementById('usage-project').value;let url='/admin/usage/summary?period='+period;if(pid)url+='&project_id='+pid;const data=await api(url);
// Top models by spend
const modelCost={};data.forEach(r=>{modelCost[r.model]=(modelCost[r.model]||0)+r.cost_usd});
const sorted=Object.entries(modelCost).sort((a,b)=>b[1]-a[1]).slice(0,8);
const maxCost=sorted.length?sorted[0][1]:1;
document.getElementById('usage-top-models').innerHTML=sorted.map(([m,c])=>`<div class="chart-bar"><span class="bar-label">${esc(m)}</span><div class="bar" style="width:${(c/maxCost*300)}px"></div><span class="bar-value">$${c.toFixed(4)}</span></div>`).join('')||'<p style="color:var(--muted)">No usage data</p>';
// Period chart
const byPeriod={};data.forEach(r=>{byPeriod[r.period]=(byPeriod[r.period]||0)+r.cost_usd});
const pSorted=Object.entries(byPeriod).sort((a,b)=>a[0].localeCompare(b[0])).slice(-14);
const maxP=pSorted.length?pSorted[pSorted.length-1][1]:1;
document.getElementById('usage-chart').innerHTML=pSorted.map(([p,c])=>`<div class="chart-bar"><span class="bar-label">${p.slice(0,10)}</span><div class="bar" style="width:${(c/maxP*300)}px"></div><span class="bar-value">$${c.toFixed(4)}</span></div>`).join('')||'<p style="color:var(--muted)">No usage data</p>'}
document.getElementById('usage-period').onchange=()=>loadUsage();
document.getElementById('usage-project').onchange=()=>loadUsage();
async function loadProjectFilter(){const projects=await api('/admin/projects');const sel=document.getElementById('usage-project');sel.innerHTML='<option value="">All Projects</option>'+projects.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}

// Providers
async function loadProviders(){const ready=await api('/ready');const providers=ready.providers||[];
document.getElementById('provider-cards').innerHTML=providers.map(p=>{const badge=p.ready?'<span class="badge green">Healthy</span>':'<span class="badge red">Unhealthy</span>';return`<div class="card provider-card"><div class="name">${esc(p.name)} ${badge}</div><div class="meta"><span>Type: ${esc(p.type)}</span><span>Keys: ${p.active_keys}/${p.configured_keys}</span>${p.reason?`<span>Reason: ${esc(p.reason)}</span>`:''}</div></div>`}).join('')||'<p style="color:var(--muted)">No providers configured</p>'}

// Logs
async function loadLogs(){const model=document.getElementById('log-model').value;const provider=document.getElementById('log-provider').value;const stream=document.getElementById('log-stream').value;let url='/admin/usage?limit=100';if(model)url+='&model='+encodeURIComponent(model);if(provider)url+='&provider='+encodeURIComponent(provider);const data=await api(url);
const filtered=stream!==''?data.filter(r=>String(r.stream)===stream):data;
document.getElementById('logs-table').innerHTML=filtered.map(r=>`<tr><td>${(r.created_at||'').slice(11,19)}</td><td>${esc(r.model)}</td><td>${esc(r.provider)}</td><td>${r.total_tokens||0}</td><td>$${(r.cost_usd||0).toFixed(4)}</td><td>${r.duration_ms||0}ms</td><td>${r.cache_hit?'<span class="badge green">HIT</span>':'—'}</td></tr>`).join('')||'<tr><td colspan="7" style="color:var(--muted);text-align:center">No log entries</td></tr>'}

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// Init
loadOverview();loadProjectFilter();
</script>
</body>
</html>
